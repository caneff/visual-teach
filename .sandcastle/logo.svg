    <rect x="324" y="216" width="20" height="30" rx="6"/><rect x="356" y="216" width="20" height="30" rx="6"/><rect x="388" y="216" width="20" height="30" rx="6"/>
    <rect x="196" y="164" width="22" height="32" rx="6"/><rect x="229" y="164" width="22" height="32" rx="6"/><rect x="262" y="164" width="22" height="32" rx="6"/><rect x="294" y="164" width="22" height="32" rx="6"/>
