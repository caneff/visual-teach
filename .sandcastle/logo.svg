<svg width="512" height="512" viewBox="98 116 316 316" xmlns="http://www.w3.org/2000/svg">
  <!-- Solid sandcastle figure only — NO background circle. GitHub adds its own
       circular badge + background color around this. Transparent background;
       sized to nearly fill GitHub's circle with a small margin. -->

