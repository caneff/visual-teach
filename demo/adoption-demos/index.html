<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>visual-teach · adoption demos</title>
    <style>
      :root {
        --bg: #fafaf8;
        --fg: #1a1a1a;
        --muted: #666;
        --rule: #ddd;
        --card: #fff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #16161a;
          --fg: #e8e8e8;
          --muted: #9a9a9a;
          --rule: #333;
          --card: #1f1f24;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font:
          15px/1.5 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--rule);
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 2;
      }
      h1 {
        font-size: 1.05rem;
        margin: 0 0 0.15rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1rem;
        align-items: center;
        margin-top: 0.75rem;
      }
      label {
        font-size: 0.8rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      select {
        font: inherit;
        padding: 0.3rem 0.5rem;
        background: var(--card);
        color: var(--fg);
        border: 1px solid var(--rule);
        border-radius: 6px;
      }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--rule);
        height: calc(100vh - 118px);
      }
      .pane {
        display: flex;
        flex-direction: column;
        background: var(--card);
        min-height: 0;
      }
      .pane h2 {
        margin: 0;
        padding: 0.4rem 0.9rem;
        font-size: 0.82rem;
        font-weight: 600;
        border-bottom: 1px solid var(--rule);
        color: var(--muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        min-height: 2rem;
      }
      .pane h2 .tag {
        font-weight: 700;
        color: var(--fg);
      }
      iframe {
        flex: 1;
        width: 100%;
        border: 0;
        background: #fff;
      }
      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
          height: auto;
        }
        iframe {
          height: 80vh;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>visual-teach · adoption demos</h1>
      <div class="sub">
        Each subject below is taught from the same spec, twice: the left pane
        with <code>/teach</code> alone, the right with <code>/teach</code> plus
        <code>visual-teach</code>.
      </div>
      <div class="controls">
        <label
          >Subject
          <select id="subject"></select>
        </label>
        <label
          >Lesson
          <select id="lesson"></select>
        </label>
      </div>
    </header>
    <main>
      <div class="pane before">
        <h2><span class="tag">/teach</span></h2>
        <iframe id="left" title="/teach lesson"></iframe>
      </div>
      <div class="pane after">
        <h2><span class="tag">/teach + visual-teach</span></h2>
        <iframe id="right" title="/teach + visual-teach lesson"></iframe>
      </div>
    </main>

    <script>
      // Add a subject by appending here. `plain`/`visual` are lesson filenames
      // under <id>/plain/lessons and <id>/visual-teach/lessons (they may differ
      // per pane).
      const SUBJECTS = [
        {
          id: "git-rebase-vs-merge",
          label: "git rebase vs merge",
          model: "opus",
          lessons: [
            {
              label: "1 · Two shapes of history",
              plain: "0001-the-two-shapes-of-history.html",
              visual: "0001-the-two-shapes-of-history.html",
            },
            {
              label: "2 · Choosing between them",
              plain: "0002-choosing-between-them.html",
              visual: "0002-choosing-between-them.html",
            },
            {
              label: "3 · Rebase without fear",
              plain: "0003-rebase-without-fear.html",
              visual: "0003-rebase-without-fear.html",
            },
          ],
        },
        {
          id: "css-flexbox",
          label: "CSS flexbox",
          model: "opus",
          lessons: [
            {
              label: "1 · The container and its axis",
              plain: "0001-the-container-and-its-axis.html",
              visual: "0001-the-container-and-its-axis.html",
            },
            {
              label: "2 · Distributing and aligning",
              plain: "0002-distributing-and-aligning.html",
              visual: "0002-distributing-and-aligning.html",
            },
            {
              label: "3 · Flexible sizing",
              plain: "0003-flexible-sizing.html",
              visual: "0003-flexible-sizing.html",
            },
          ],
        },
        {
          id: "tls-handshake",
          label: "the TLS handshake",
          model: "opus",
          lessons: [
            {
              label: "1 · What TLS protects",
              plain: "0001-what-tls-protects-and-who-is-involved.html",
              visual: "0001-what-tls-protects-and-who-is-involved.html",
            },
            {
              label: "2 · The handshake, step by step",
              plain: "0002-the-handshake-step-by-step.html",
              visual: "0002-the-handshake-step-by-step.html",
            },
            {
              label: "3 · Trust and failure",
              plain: "0003-trust-and-failure.html",
              visual: "0003-trust-and-failure.html",
            },
          ],
        },
        {
          id: "regular-expressions",
          label: "regular expressions",
          model: "opus",
          lessons: [
            {
              label: "1 · Literals and character classes",
              plain: "0001-literals-and-character-classes.html",
              visual: "0001-literals-and-character-classes.html",
            },
            {
              label: "2 · Quantifiers and anchors",
              plain: "0002-quantifiers-and-anchors.html",
              visual: "0002-quantifiers-and-anchors.html",
            },
            {
              label: "3 · Groups, alternation, and capture",
              plain: "0003-groups-alternation-and-capture.html",
              visual: "0003-groups-alternation-and-capture.html",
            },
          ],
        },
        {
          id: "bayes-theorem",
          label: "Bayes' theorem",
          model: "opus",
          lessons: [
            {
              label: "1 · Conditional probability and the trap",
              plain: "0001-conditional-probability-and-the-trap.html",
              visual: "0001-conditional-probability-and-the-trap.html",
            },
            {
              label: "2 · Bayes' theorem",
              plain: "0002-bayes-theorem.html",
              visual: "0002-bayes-theorem.html",
            },
            {
              label: "3 · The base-rate fallacy, applied",
              plain: "0003-the-base-rate-fallacy-applied.html",
              visual: "0003-the-base-rate-fallacy-applied.html",
            },
          ],
        },
        {
          id: "music-intervals",
          label: "music: intervals & the major scale",
          model: "opus",
          lessons: [
            {
              label: "1 · The twelve notes and the keyboard",
              plain: "0001-the-twelve-notes-and-the-keyboard.html",
              visual: "0001-the-twelve-notes-and-the-keyboard.html",
            },
            {
              label: "2 · Intervals: distance in semitones",
              plain: "0002-intervals-distance-in-semitones.html",
              visual: "0002-intervals-distance-in-semitones.html",
            },
            {
              label: "3 · Building the major scale",
              plain: "0003-building-the-major-scale.html",
              visual: "0003-building-the-major-scale.html",
            },
          ],
        },
      ];

      const $ = (id) => document.getElementById(id);
      const subjectSel = $("subject");
      const lessonSel = $("lesson");

      SUBJECTS.forEach((s, i) => {
        subjectSel.add(new Option(s.label, i));
      });

      function fillLessons() {
        const s = SUBJECTS[subjectSel.value];
        lessonSel.innerHTML = "";
        s.lessons.forEach((l, i) => lessonSel.add(new Option(l.label, i)));
        render();
      }

      function render() {
        const s = SUBJECTS[subjectSel.value];
        const l = s.lessons[lessonSel.value];
        $("left").src = `${s.id}/plain/lessons/${l.plain}`;
        $("right").src = `${s.id}/visual-teach/lessons/${l.visual}`;
      }

      // The visual-teach pane shows base.js's own native theme toggle (it
      // renders inside the iframe), so the index needs no theme control of its
      // own — it looks and behaves exactly like opening the lesson directly.

      subjectSel.addEventListener("change", fillLessons);
      lessonSel.addEventListener("change", render);
      fillLessons();
    </script>
  </body>
</html>
